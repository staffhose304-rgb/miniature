
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Struk Transfer BNI Wonder</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --accent-color: #e5f14e;
      --panel-bg: #1e293b;
      --input-bg: #0f172a;
      --input-border: #334155;
      --text-color: #f1f5f9;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0b0f1a;
      color: var(--text-color);
      font-family: 'Inter', sans-serif;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
    }

    .left-panel, .right-panel {
      background: var(--panel-bg);
      padding: 20px;
      border-radius: 12px;
    }

    .left-panel {
      flex: 1 1 320px;
      max-width: 400px;
    }

    .right-panel {
      flex: 0 0 auto;
    }

    .left-panel label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      margin-top: 12px;
    }

    .left-panel input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text-color);
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }

    .left-panel input:focus {
      outline: none;
      border-color: var(--accent-color);
    }

    .left-panel input::placeholder {
      color: #64748b;
      font-weight: 400;
    }

    .button-group {
      display: flex;
      gap: 20px;
      margin-top: 50px;
    }

    .btn-primary, .btn-secondary {
      padding: 10px;
      flex: 1;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.2s;
    }

    .btn-primary {
      background-color: var(--accent-color);
      color: #111827;
    }

    .btn-primary:hover {
      background-color: #d7ef3c;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background-color: #475569;
      color: white;
    }

    .btn-secondary:hover {
      background-color: #334155;
      transform: translateY(-1px);
    }

    .frame {
      width: 390px;
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      position: relative;
    }

    .background {
      width: 100%;
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .header {
      position: absolute;
      left: 0;
      width: 100%;
      text-align: center;
      top: 180px;
      color: #0b1320;
    }

    .header .amount {
      font-weight: 900;
      font-size: 36px;
    }

    .header .meta {
      margin-top: 8px;
      font-size: 13px;
      color: #111827;
    }

    .header .ref {
      margin-top: 6px;
      font-size: 14px;
      color: #111827;
    }

   /* ===== CARD ===== */
.card {
  position: absolute;
  width: 84%;
  left: 8%;
  height: 84px;
  pointer-events: none;
}

.rcv-card { top: 54.8%; }
.src-card { top: 69.0%; }

.card .line {
  position: absolute;
  font-size: 14px;
  color: #111827;
}

/* ===== RECEIVER ===== */
.rcv-card .name { top: 36px; left: 10px; }
.rcv-card .sub  {
  top: 58px;
  left: 10px;
  position: relative;
  height: 20px;
}

#rcv_bank {
  position: absolute;
  top: 0;
  left: 0;
}

#src_dot1 {
  position: absolute;
  top: 2px;
  left: 27px;
  font-size: 16px;   /* ⬅️ INI KUNCI UTAMA */
  font-weight: 700;
  line-height: 1;
}

#rcv_number {
  position: absolute;
  top: 0;
  left: 36px;   /* ⬅️ EDIT */
}

/* ===== SENDER ===== */
.src-card .name { top: 35px; left: 10px; }
.src-card .sub  {
  top: 56px;
  left: 10px;
  position: relative;
  height: 20px;
}

#src_product {
  position: absolute;
  top: 0;
  left: 0;
}

#src_dot2 {
  position: absolute;
  top: 2px;
  left: 57px;
  font-size: 16px;   /* ⬅️ INI KUNCI UTAMA */
  font-weight: 700;
  line-height: 1;
}

#src_number {
  position: absolute;
  top: 0px;
  left: 66px;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 1.2px;
}

#src_number01 {
  position: absolute;
  top: 0;
  left: 117px;  /* ⬅️ EDIT */
  font-weight: 200;
}

/* ===== UTIL ===== */
.piece {
  display: inline-block;
  min-width: .25ch;
}
.home-btn{
      position:fixed; left:50%; bottom:calc(22px + env(safe-area-inset-bottom));
      transform:translateX(-50%); z-index:9999;
      display:inline-flex; align-items:center; gap:15px;
      padding:12px 30px; border-radius:15px; border:1px solid rgba(255,255,255,.15);
      font-weight:800; font-size:14px; letter-spacing:.10px; text-decoration:none; color:#fff;
      background:linear-gradient(100deg,#6d28d9,#6366f1,#6d28d9);
      background-size:200% 100%; animation:slideX 3.2s ease-in-out infinite alternate;
      box-shadow:0 8px 30px rgba(0,0,0,.35),0 0 18px rgba(99,102,241,.65),0 0 0 1px rgba(255,255,255,.12) inset;
      transition:transform .2s ease, filter .2s ease, box-shadow .2s ease;
    }
    .home-btn:hover{transform:translateX(-50%) translateY(-2px); filter:brightness(1.07)}
    .home-btn:active{transform:translateX(-50%) translateY(0); filter:brightness(.96)}
    .home-btn::after{
      content:""; position:absolute; left:50%; bottom:-14px; transform:translateX(-50%);
      width:200px; height:30px; border-radius:999px; pointer-events:none;
      background:radial-gradient(50% 60% at 50% 50%, rgba(200,58,237,.55), rgba(124,58,237,0));
      filter:blur(6px);
    }
    @keyframes slideX{0%{background-position:0% 50%}100%{background-position:100% 50%}}
    @media (prefers-reduced-motion: reduce){.home-btn{animation:none}}
  </style>
</head>
<body>
  <div class="container">
    <div class="left-panel">
      <label>Nominal Transfer</label>
      <input id="input-nominal" oninput="formatNominal(this); updateStruk();" placeholder="0">

      <label>Tanggal Transaksi</label>
      <input id="input-tanggal" oninput="updateStruk()" placeholder="04 Sep 2025">

      <label>Waktu Lengkap</label>
      <input id="input-waktu-lengkap" oninput="updateStruk()" placeholder="18:16:07 WIB">

      <label>Nomor Referensi</label>
      <input id="input-ref" oninput="updateStruk()" placeholder="0">

      <label>Nama Penerima</label>
      <input id="input-nama-penerima" oninput="updateStruk()" placeholder="ANDI SETIAWAN">

      <label>No. Rekening Penerima</label>
      <input id="input-norek-penerima" oninput="updateStruk()" placeholder="5678901234">

      <label>Nama Pengirim</label>
      <input id="input-nama-pengirim" oninput="updateStruk()" placeholder="HENDRA AJA">

      <label>4 Digit Akhir Rekening Pengirim</label>
      <input id="input-norek-pengirim-suffix" oninput="updateStruk()" maxlength="4" placeholder="012">

      <div class="button-group">
        <button class="btn-secondary" onclick="acakData()">Acak Data</button>
        <button class="btn-primary" onclick="downloadPNG()">Download PNG</button>
      </div>
    </div>

    <div class="right-panel">
      <div class="frame" id="capture">
        <img src="https://i.imgur.com/u1dScHB.jpeg" class="background" alt="Struk WONDER" crossorigin="anonymous"/>
        <div class="overlay">
          <div class="header">
              <div class="amount" id="amount">Rp79.200.000</div>
              <div class="meta" id="datetime">04 Sep 2025 · 18:16:07 WIB ·</div>
              <div class="ref" id="ref">Ref ID: 202502060959460003388</div>
            </div>

          <div class="card rcv-card">
            <div class="line name">
              <span id="rcv_title" class="piece">Ibu</span>
              <span id="rcv_name" class="piece">ANDI SETIAWAN</span>
            </div>
            <div class="line sub">
              <span id="rcv_bank" class="piece">BNI</span>
              <span id="src_dot1" class="piece">·</span>
              <span id="rcv_number" class="piece">5678901234</span>
            </div>
          </div>

          <div class="card src-card">
            <div class="line name"><span id="src_name" class="piece">HENDRA AJA</span></div>
            <div class="line sub">
              <span id="src_product" class="piece">TAPLUS</span>
              <span id="src_dot2" class="piece">·</span>
              <span id="src_number" class="piece">*******</span>
			  <span id="src_number01" class="piece">012</span>	
            </div>
          </div>
        </div>
      </div>
    </div>
  <div id="grid" class="grid"></div>
  <a class="home-btn" href="index.html">← Kembali ke Home</a>

<script>
/* ================= UTIL ================= */
const $ = id => document.getElementById(id);

function rupiah(n) {
  return "Rp" + n.toLocaleString("id-ID");
}

function toNumberID(str) {
  const digits = (str || "").replace(/[^\d]/g, "");
  return digits ? parseInt(digits, 10) : 0;
}

function formatNominal(el) {
  const val = toNumberID(el.value);
  el.value = val ? val.toLocaleString("id-ID") : "";
}

/* ================= DATASET ACAK (WAJIB ADA) ================= */
const penerimaNames = [
  "HASAN BASRI","SITI NURHALIZA","AHMAD WIJAYA","DEWI SARTIKA","RIZKI PRATAMA",
  "MAYA SARI","ANDI SETIAWAN","BUDI PRASETYO","CINDY LESTARI","GITA NURANI",
  "JOKO SUDARSO","LISA PUTRI","YUDI PRATAMA","TANIA WULANDARI","HENDRIK KURNIAWAN",
  "VIVIANA KENCANA","FIRDAUS AHMAD","RINA MUNIR","EDY SULISTYO","ANITA KURNIATI",
  "SAMSON HALIM","LIA HERMAN","RUDI KUSUMA","NATASHA HASTARI","SYAIFUL HAKIM",
  "JESSICA NOVIANTI","IMAM ZULKIFLI","ARIYANTI SIREGAR","CATHERINE HARAHAP",
  "GUNAWAN SANTOSA","WAWAN KUSNADI","ZULFADLI MAHMUD","ELSA SUTANTO",
  "BANGKIT WIRAWAN","ANGGI YULIANTI"
];

const sumberNames = [
  "BAGASTIO ABDURRAJA","HENDRA AJA","MAYA KUSUMA","FAJAR PRATAMA","LINDA PERMATA",
  "WILLIAM SANTOSO","NADYA WULANDARI","DINO KURNIAWAN","SUSI HARTINI","BUDI ARIANTO",
  "TOMMY WINANTO","RINA MELANIA","ALDO RAHARDIAN","ELLY SAFITRI","MARCELLA HANDAYANI",
  "RAFAEL DWI","MADE WIRAWAN","FANYA KURNIA","DANI PERMANA","ANDREW TARING",
  "NADIA NURJANAH","REZA RIZAL","VINA NOVITA","YUDHI SETIAWAN","RIZKI FADILLAH",
  "JULIUS PRATAMA","EMILIA SARI","DEWANGGA ALIF","MELISSA SUTISNA","TINO KAWI",
  "RIZAL NOVIANTO","VIRGITA AGUSTINA","RAHMAT HIDAYAT","CINTA MAHARANI"
];

const rekNumbers = [
  "1908457073","5678901234","9876543210","1234567890","3456789012"
];

const srcTails = [
  "012","027","053","088","102","123","145","167","189","201",
  "234","256","278","299","301","321","345","367","389","401",
  "423","445","467","489","501","523","545","567","589","601",
  "623","645","667","689","701","723","745","767","789","801",
  "823","845","867","889","901","923","945","967","989"
];

/* ================= RANDOM NOMINAL (UNTUK ACAK SAJA) ================= */
function randNominal(){
  const MIN = 20_000_000;
  const MAX = 100_000_000;
  const STEP = 100_000;
  const P100 = 0.2;

  if (Math.random() < P100) return MAX;

  const hi = MAX - STEP;
  const steps = Math.floor((hi - MIN) / STEP) + 1;
  const idx = Math.floor(Math.random() * steps);
  return MIN + idx * STEP;
}

/* ================= GENDER (TIDAK DIUBAH) ================= */
function getGender(name) {
  const maleNames = [
    "HASAN BASRI","AHMAD WIJAYA","RIZKI PRATAMA","ANDI SETIAWAN","JOKO SUDARSO",
    "YUDI PRATAMA","HENDRIK KURNIAWAN","FIRDAUS AHMAD","EDY SULISTYO",
    "SAMSON HALIM","RUDI KUSUMA","SYAIFUL HAKIM","IMAM ZULKIFLI",
    "GUNAWAN SANTOSA","WAWAN KUSNADI","ZULFADLI MAHMUD","BANGKIT WIRAWAN"
  ];

  const femaleNames = [
    "SITI NURHALIZA","DEWI SARTIKA","MAYA SARI","CINDY LESTARI","GITA NURANI",
    "LISA PUTRI","TANIA WULANDARI","VIVIANA KENCANA","RINA MUNIR",
    "ANITA KURNIATI","LIA HERMAN","NATASHA HASTARI","JESSICA NOVIANTI",
    "CATHERINE HARAHAP","ELSA SUTANTO","ANGGI YULIANTI"
  ];

  if (maleNames.includes(name)) return "Bpk";
  if (femaleNames.includes(name)) return "Ibu";
  return "";
}

/* ================= UPDATE STRUK (INTI) ================= */
function updateStruk() {

  // Nominal (BEBAS, TANPA BATASAN)
  const n = toNumberID($("input-nominal").value);
  $("amount").textContent = n ? rupiah(n) : "Rp0";

  // Tanggal & Waktu
  const tgl = $("input-tanggal").value.trim();
  const wkt = $("input-waktu-lengkap").value.trim();
  if (tgl && wkt) {
    $("datetime").textContent = `${tgl} · ${wkt} ·`;
  }

  // Ref ID
  const ref = $("input-ref").value.trim();
  if (ref) $("ref").textContent = `Ref ID: ${ref}`;

  // Nama Penerima (LOGIKA ASLI)
  const namaPenerima = $("input-nama-penerima").value.trim();
  if (namaPenerima) {
    $("rcv_name").textContent = namaPenerima;
    const title = getGender(namaPenerima.toUpperCase());
    $("rcv_title").textContent = title ? title : "Bpk";
  }

  // Rekening Penerima
  const rekPenerima = $("input-norek-penerima").value.trim();
  if (rekPenerima) $("rcv_number").textContent = rekPenerima;

  // Nama Pengirim (LOGIKA ASLI)
  const namaPengirim = $("input-nama-pengirim").value.trim();
  if (namaPengirim) $("src_name").textContent = namaPengirim;

  // Rekening Pengirim
  const suf = $("input-norek-pengirim-suffix").value.trim();
  if (suf) {
    $("src_number").textContent = "*******";
    $("src_number01").textContent = suf;
  }
}

/* ================= ACAK DATA ================= */
function acakData() {
  const now = new Date();

  const penerima = penerimaNames[Math.floor(Math.random() * penerimaNames.length)];
  const pengirim = sumberNames[Math.floor(Math.random() * sumberNames.length)];
  const rekening = rekNumbers[Math.floor(Math.random() * rekNumbers.length)];
  const suf = srcTails[Math.floor(Math.random() * srcTails.length)];

  const YYYY = now.getFullYear();
  const MM = String(now.getMonth() + 1).padStart(2, "0");
  const DD = String(now.getDate()).padStart(2, "0");
  const HH = String(now.getHours()).padStart(2, "0");
  const mm = String(now.getMinutes()).padStart(2, "0");
  const ss = String(now.getSeconds()).padStart(2, "0");

  const random6 = Math.floor(Math.random() * 1_000_000)
    .toString()
    .padStart(6, "0");

  $("input-ref").value = `${YYYY}${MM}${DD}${HH}${mm}${ss}${random6}`;

  const nominal = randNominal();
  $("input-nominal").value = nominal.toString();
  formatNominal($("input-nominal"));

  $("input-tanggal").value = now.toLocaleDateString("id-ID", {
    day: "2-digit",
    month: "short",
    year: "numeric"
  });

  $("input-waktu-lengkap").value =
    now.toLocaleTimeString("id-ID", {
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit"
    }).replaceAll(".", ":") + " WIB";

  $("input-nama-penerima").value = penerima;
  $("input-norek-penerima").value = rekening;
  $("input-nama-pengirim").value = pengirim;
  $("input-norek-pengirim-suffix").value = suf;

  updateStruk();
}

/* ================= DOWNLOAD PNG ================= */
async function downloadPNG() {
  try {
    const canvas = await html2canvas(document.getElementById("capture"), {
      useCORS: true,
      scale: 3,
      backgroundColor: "#ffffff"
    });

    canvas.toBlob(blob => {
      if (!blob) return alert("Gagal membuat gambar.");
      const a = document.createElement("a");
      a.download = "Struk-WONDER-BNI.png";
      a.href = URL.createObjectURL(blob);
      a.click();
      URL.revokeObjectURL(a.href);
    });
  } catch (err) {
    alert("Gagal mengunduh gambar.");
    console.error(err);
  }
}
</script>
</body>
</html>
